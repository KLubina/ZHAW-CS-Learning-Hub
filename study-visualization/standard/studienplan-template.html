<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Studienplan</title>

    <!-- ==== CORE CSS ==== -->
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/core/layout.css">
    <link rel="stylesheet" href="css/core/typography.css">

    <!-- ==== CORE COMPONENTS CSS ==== -->
    <link rel="stylesheet" href="css/core/hub-button.css">
    <link rel="stylesheet" href="css/core/module.css">
    <link rel="stylesheet" href="css/core/legend.css">

    <!-- ==== OPTIONAL FEATURES CSS ==== -->
    <link rel="stylesheet" href="css/optional/study-links.css">
    <link rel="stylesheet" href="css/optional/tooltip.css">
    <link rel="stylesheet" href="css/optional/kp-counter.css">
    <link rel="stylesheet" href="css/optional/module-lists.css">
    <link rel="stylesheet" href="css/optional/indicators.css">
    <link rel="stylesheet" href="css/optional/major-minor-selector.css">
    <link rel="stylesheet" href="css/optional/color-manager.css">
    <link rel="stylesheet" href="css/optional/wahlmodule.css">

    <!-- ==== SHARED CSS ==== -->
    <link rel="stylesheet" id="uzh-common-css" href="">

    <!-- ==== PROGRAM-SPECIFIC CSS (loaded dynamically) ==== -->
    <link rel="stylesheet" id="program-colors-css" href="">
    <link rel="stylesheet" id="program-classes-css" href="">
    <link rel="stylesheet" id="program-layout-css" href="">
</head>

<body data-studiengang="">
    <!-- Zurück zum Hub Button -->
    <div class="hub-button-container">
        <a href="../../index.html" class="hub-button">← Zurück zum Hub</a>
    </div>

    <h1 id="studienplan-title">Studienplan</h1>
    <h2 id="studienplan-subtitle">mind. 180 KP insgesamt</h2>

    <!-- Major/Minor Selector (nur für major-minor Studiengänge) -->
    <div id="major-minor-selector" class="major-minor-selector" style="display: none;">
        <!-- JavaScript wird hier den Selector einfügen -->
    </div>

    <div class="container">
        <div class="studienplan" id="studienplan">
            <!-- JavaScript wird hier die Jahre und Module einfügen -->
        </div>

        <!-- Farben-Legende -->
        <div class="farben-legende">
            <div class="legende-titel" id="legende-titel">Farben-Legende</div>
            <div id="legende">
                <!-- JavaScript wird hier die Legende einfügen -->
            </div>
        </div>
    </div>

    <!-- Tooltip-Container -->
    <div id="tooltip" class="tooltip-container" style="display: none;"></div>

    <!-- Base JavaScript -->
    <script src="js/studienplan-base-loader.js"></script>

    <script>
        // URL Parameter auslesen
        const urlParams = new URLSearchParams(window.location.search);
        const studiengang = urlParams.get('studiengang') || 'eth-cs';

        // NEU: Data-Attribut setzen für CSS-Variablen
        document.body.setAttribute('data-studiengang', studiengang);

        // Bestimme das Modell (Veraltet: studyModel wird nicht mehr für Pfade verwendet)
        // const studyModel = 'mono';

        // UZH Common CSS laden (nur für UZH Programme)
        const uzhCommonCSS = document.getElementById('uzh-common-css');
        if (studiengang.startsWith('uzh-')) {
            // Found in program-specific/uzh-common
            uzhCommonCSS.href = `../program-specific/uzh-common/uzh-common.css`;
        }

        // Program-specific CSS laden (colors, classes, layout)
        const programColorsCSS = document.getElementById('program-colors-css');
        const programClassesCSS = document.getElementById('program-classes-css');
        const programLayoutCSS = document.getElementById('program-layout-css');

        programColorsCSS.href = `../program-specific/${studiengang}/standard-config/colors/colors.css`;
        programClassesCSS.href = `../program-specific/${studiengang}/standard-config/colors/classes.css`;
        programLayoutCSS.href = `../program-specific/${studiengang}/individual/layout.css`;

        // Error handling falls Dateien nicht existieren
        programColorsCSS.onerror = () => {
            console.log(`No colors.css found for ${studiengang}`);
        };
        programClassesCSS.onerror = () => {
            console.log(`No classes.css found for ${studiengang}`);
        };
        programLayoutCSS.onerror = () => {
            console.log(`No layout.css found for ${studiengang}`);
        };

        // DOM Ready
        document.addEventListener('DOMContentLoaded', async function () {
            // Wait for all base modules to load first
            await window.baseModulesReady;

            // ConfigLoader now handles all config and extension loading
            window.loadStudiengangConfig(studiengang);
        });
    </script>
</body>

</html>
